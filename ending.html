<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(
    135deg,
    #ff9a9e,
    #fad0c4,
    #ffd1dc
    );

    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* MAIN CONTAINER */

.container{
    text-align:center;
    z-index:5;
    padding:20px;
}

/* TITLE */

.title{
    font-family:'Dancing Script',cursive;
    font-size:75px;
    color:white;
    opacity:0;

    animation:
    fadeUp 2s forwards;
}

/* SUBTITLE */

.subtitle{
    margin-top:20px;
    font-size:22px;
    color:white;
    max-width:700px;
    line-height:1.8;

    opacity:0;

    animation:
    fadeUp 2s forwards;

    animation-delay:2s;
}

/* FINAL NAME */

.final{
    margin-top:35px;

    font-size:34px;

    color:white;

    font-weight:700;

    opacity:0;

    text-shadow:
    0 0 15px rgba(255,255,255,0.7);

    animation:
    glowFade 3s infinite alternate,
    fadeUp 2s forwards;

    animation-delay:4s;
}

/* BUTTON */

.btn{
    margin-top:40px;

    padding:14px 30px;

    border:none;

    border-radius:40px;

    background:white;

    color:#ff4d88;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    opacity:0;

    transition:0.3s;

    animation:
    fadeUp 2s forwards;

    animation-delay:6s;
}

.btn:hover{
    transform:scale(1.08);
}

/* FLOATING HEARTS */

.heart{
    position:absolute;

    bottom:-50px;

    color:rgba(255,255,255,0.8);

    animation:float linear infinite;
}

/* SPARKLES */

.sparkle{
    position:absolute;

    width:6px;
    height:6px;

    background:white;

    border-radius:50%;

    opacity:0.7;

    animation:
    sparkleAnim 3s infinite alternate;
}

/* ANIMATIONS */

@keyframes float{

    0%{
        transform:translateY(0) scale(1);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:
        translateY(-120vh)
        scale(1.5);

        opacity:0;
    }
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glowFade{

    from{
        text-shadow:
        0 0 10px rgba(255,255,255,0.4);
    }

    to{
        text-shadow:
        0 0 30px rgba(255,255,255,1),
        0 0 60px rgba(255,255,255,0.8);
    }
}

@keyframes sparkleAnim{

    from{
        transform:scale(0.5);
        opacity:0.2;
    }

    to{
        transform:scale(1.8);
        opacity:1;
    }
}

/* MOBILE */

@media(max-width:600px){

    .title{
        font-size:52px;
    }

    .subtitle{
        font-size:17px;
    }

    .final{
        font-size:28px;
    }
}

</style>
</head>

<body>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- SPARKLES -->
<div id="sparkles"></div>

<!-- MAIN CONTENT -->

<div class="container">

<div class="title">
Thank You ❤️
</div>

<div class="subtitle">

Thank you for being part of my life, Alishba.

Every moment, every smile, every memory with you became something special to me.

No matter where life takes us,
a part of my heart will always belong to you ❤️

</div>

<div class="final">
Forever Yours,<br>
Shahzaib ❤️
</div>

<button class="btn" onclick="restartStory()">
Replay Our Story ❤️
</button>

</div>

<script>

/* RESTART */

function restartStory(){

    document.body.style.opacity="0";

    setTimeout(()=>{
        window.location.href="index.html";
    },600);
}

/* HEARTS */

const hearts =
document.getElementById("hearts");

function createHeart(){

    const h =
    document.createElement("div");

    h.classList.add("heart");

    h.innerHTML="❤️";

    h.style.left =
    Math.random()*100+"vw";

    h.style.fontSize =
    Math.random()*20+15+"px";

    h.style.animationDuration =
    Math.random()*5+5+"s";

    hearts.appendChild(h);

    setTimeout(()=>{
        h.remove();
    },10000);
}

setInterval(createHeart,300);

/* SPARKLES */

const sparkles =
document.getElementById("sparkles");

function createSparkle(){

    const s =
    document.createElement("div");

    s.classList.add("sparkle");

    s.style.left =
    Math.random()*100+"vw";

    s.style.top =
    Math.random()*100+"vh";

    s.style.animationDuration =
    Math.random()*2+2+"s";

    sparkles.appendChild(s);

    setTimeout(()=>{
        s.remove();
    },4000);
}

setInterval(createSparkle,200);

</script>

</body>
</html>
