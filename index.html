<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For Alishba ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
    135deg,
    #ff9a9e,
    #fad0c4,
    #ffdde1
    );
    overflow:hidden;
    position:relative;
}

/* Floating Hearts */

.heart{
    position:absolute;
    bottom:-50px;
    color:rgba(255,255,255,0.6);
    animation:float 10s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

.container{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:35px;
    padding:40px 25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-family:'Dancing Script', cursive;
    font-size:48px;
    color:#fff;
    margin-bottom:15px;
}

.subtitle{
    color:#fff;
    font-size:15px;
    margin-bottom:25px;
}

.question{
    font-size:32px;
    color:#fff;
    font-weight:700;
    line-height:1.3;
    margin-bottom:20px;
}

.message{
    color:white;
    font-size:18px;
    font-weight:500;
    margin-bottom:20px;
    min-height:30px;
    transition:0.3s;
}

.btn-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
}

button{
    border:none;
    cursor:pointer;
    transition:0.4s ease;
    border-radius:50px;
    font-weight:600;
}

#yesBtn{
    background:#ff4d88;
    color:white;
    padding:16px 40px;
    font-size:22px;
    box-shadow:0 6px 20px rgba(255,77,136,0.4);
}

#noBtn{
    background:white;
    color:#ff4d88;
    padding:16px 40px;
    font-size:22px;
}

#yesBtn:hover{
    transform:scale(1.08);
}

.from{
    margin-top:30px;
    color:white;
    font-size:15px;
}

.big-yes{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

@media(max-width:480px){

    .question{
        font-size:26px;
    }

    #yesBtn,#noBtn{
        padding:14px 28px;
        font-size:18px;
    }

    h1{
        font-size:42px;
    }
}
</style>
</head>

<body>

<div id="hearts"></div>

<div class="container">

<h1>Hey Alishba ❤️</h1>

<p class="subtitle">
A tiny question from someone special...
</p>

<div class="question">
Will you be mine forever? ❤️
</div>

<div class="message" id="message">
</div>

<div class="btn-container">

<button id="yesBtn">
Yes ❤️
</button>

<button id="noBtn">
No 💔
</button>

</div>

<div class="from">
From Shahzaib ❤️
</div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

let clickCount = 0;
let yesScale = 1;

const messages = [
"Think again 🥺",
"Are you really sure? 😭",
"Last chance 😭"
];

noBtn.addEventListener("click", ()=>{

    if(clickCount < 3){

        message.innerText = messages[clickCount];

        yesScale += 0.35;
        yesBtn.style.transform = `scale(${yesScale})`;

        let currentNoSize =
        parseFloat(window.getComputedStyle(noBtn).fontSize);

        noBtn.style.transform =
        `scale(${1 - clickCount * 0.25})`;

        clickCount++;
    }

    if(clickCount === 3){

        noBtn.style.display = "none";

        yesBtn.classList.add("big-yes");

        yesBtn.style.transform = "scale(1.9)";
        yesBtn.style.padding =
        "22px 55px";

        message.innerText =
        "Only one option left 😭❤️";
    }

});

yesBtn.addEventListener("click", ()=>{

    document.body.style.opacity = "0";

    setTimeout(()=>{
        window.location.href =
        "gifts.html";
    },500);

});

/* Hearts */

const heartsContainer =
document.getElementById("hearts");

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random() * 100 + "vw";

    heart.style.fontSize =
    Math.random() * 20 + 20 + "px";

    heart.style.animationDuration =
    Math.random() * 5 + 5 + "s";

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
