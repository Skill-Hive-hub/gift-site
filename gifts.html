<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Choose Your Gift ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    margin:0;
    min-height:100vh;

    background:linear-gradient(
    135deg,
    #ff9a9e,
    #fad0c4,
    #ffd1dc
    );

    overflow-x:hidden;
    overflow-y:scroll;

    position:relative;

    padding:40px 15px;

    display:block;
}
.container{
    width:100%;
    max-width:1200px;

    margin:auto;

    text-align:center;

    position:relative;
    z-index:2;

    padding-bottom:120px;
}

h1{
    font-family:'Dancing Script',cursive;
    color:white;
    font-size:60px;
    margin-bottom:10px;
}

.subtitle{
    color:white;
    font-size:18px;
    margin-bottom:50px;
}

.gifts{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;

    flex-wrap:wrap;

    width:100%;

    margin-top:30px;
}

.card{
    width:300px;
    height:360px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:35px;
    padding:30px;
    cursor:pointer;
    transition:0.4s ease;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.card:hover{
    transform:translateY(-15px) scale(1.04);
}

.emoji{
    font-size:80px;
    margin-bottom:20px;
}

.title{
    color:white;
    font-size:28px;
    font-weight:700;
    margin-bottom:15px;
}

.desc{
    color:white;
    font-size:15px;
    opacity:0.95;
}

.from{
    margin-top:45px;
    color:white;
    font-size:18px;
}

.heart{
    position:absolute;
    bottom:-50px;
    animation:float linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@media(max-width:900px){

    h1{
        font-size:50px;
    }

    .card{
        width:100%;
        max-width:330px;
        height:320px;
    }
}

@media(max-width:480px){

    h1{
        font-size:42px;
    }

    .subtitle{
        font-size:16px;
    }

    .title{
        font-size:24px;
    }
}

@media(max-width:768px){

    body{
        padding-top:30px;
        padding-bottom:120px;
    }

    .gifts{
        flex-direction:column;
    }

    .card{
        width:100%;
        max-width:330px;
    }
}

</style>
</head>
<body>

<div id="hearts"></div>

<div class="container">

<h1>Choose Your Gift ❤️</h1>

<p class="subtitle">
A little surprise made specially for you, Alishba 💖
</p>

<div class="gifts">

<div class="card" onclick="openPage('memories.html')">

<div class="emoji">📸</div>

<div class="title">
Memories
</div>

<div class="desc">
A collection of beautiful moments we shared ❤️
</div>

</div>

<div class="card" onclick="openPage('card.html')">

<div class="emoji">💌</div>

<div class="title">
Love Letter
</div>

<div class="desc">
Something heartfelt written just for you ❤️
</div>

</div>

<div class="card" onclick="openPage('music.html')">

<div class="emoji">🎵</div>

<div class="title">
Special Song
</div>

<div class="desc">
A song dedicated specially to you ❤️
</div>

</div>

</div>

<div class="from">
Made with ❤️ by Shahzaib
</div>

</div>

<script>

function openPage(page){

    document.body.style.opacity = "0";

    setTimeout(()=>{
        window.location.href = page;
    },400);
}

/* Floating Hearts */

const hearts =
document.getElementById("hearts");

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    Math.random()*20 + 15 + "px";

    heart.style.animationDuration =
    Math.random()*4 + 5 + "s";

    hearts.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },9000);
}

setInterval(createHeart,350);

</script>

</body>
</html>
