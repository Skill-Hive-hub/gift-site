<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Letter ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Container */

.container{
    width:100%;
    max-width:750px;
    text-align:center;
}

/* Title */

h1{
    font-family:'Dancing Script',cursive;
    color:white;
    font-size:52px;
    margin-bottom:20px;
}

/* Envelope (visual only) */

.envelope{
    width:200px;
    height:130px;
    background:#ff4d88;
    margin:auto;
    border-radius:10px;
    position:relative;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.flap{
    position:absolute;
    top:0;
    width:100%;
    height:50%;
    background:#ff3366;
    clip-path:polygon(0 0,100% 0,50% 100%);
}

/* OPEN STATE (just aesthetic) */

.envelope.open{
    transform:scale(1.05);
    transition:0.4s ease;
}

/* Letter card BELOW envelope */

.letter-box{
    margin-top:30px;
    background:white;
    border-radius:20px;
    padding:25px;
    min-height:280px;
    text-align:left;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* Text */

#text{
    color:#333;
    font-size:16px;
    line-height:1.7;
    white-space:pre-line;
}

/* Prompt */

.prompt{
    margin-top:15px;
    color:white;
    font-size:16px;
}

/* Button */

.back{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d88;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.back:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>💌 A Letter For You</h1>

<div class="envelope" id="envelope" onclick="openLetter()">
<div class="flap"></div>
</div>

<div class="prompt">
Click the envelope to open your letter ❤️
</div>

<div class="letter-box">
<p id="text"></p>
</div>

<button class="back" onclick="goBack()">← Back to Gifts</button>

</div>

<script>

function goBack(){
    document.body.style.opacity="0";
    setTimeout(()=>{
        window.location.href="gifts.html";
    },400);
}

/* Envelope click */

function openLetter(){

    document.getElementById("envelope")
    .classList.add("open");

    if(!started){
        typeWriter();
        started = true;
    }
}

/* Letter text */

const text =
`Dear Alishba ❤️

I don’t even know where to start, because every word feels small when it comes to you.

From the moment you came into my life, everything started feeling different… better… warmer.

You are not just someone I think about, you are someone I feel in every little moment of my day.

If I ever had to choose again, I would still choose you — every single time, without thinking twice.

I don’t promise perfection, but I promise honesty, care, and a heart that will always value you.

No matter where life takes us, you will always remain special to me.

— Shahzaib ❤️`;

let i = 0;
let started = false;

function typeWriter(){

    if(i < text.length){

        document.getElementById("text").innerHTML += text.charAt(i);
        i++;

        setTimeout(typeWriter,25);
    }
}

</script>

</body>
</html>
